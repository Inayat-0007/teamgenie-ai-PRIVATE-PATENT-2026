name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PYTHON_ENV: 'test'
  ENABLE_AI_FIREWALL: 'false'
  ENABLE_SELF_HEALING: 'false'

jobs:
  # ==========================================
  # Backend (Python / FastAPI)
  # ==========================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt || uv pip install --system fastapi uvicorn pydantic pydantic-settings python-dotenv python-multipart python-jose httpx structlog tenacity pytest pytest-cov pytest-asyncio email-validator
          uv pip install --system black ruff

      - name: Lint (Ruff — fast)
        run: ruff check .

      - name: Format check (Black)
        run: black --check --diff .

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy . --ignore-missing-imports --no-error-summary

      - name: Test
        env:
          PYTHON_ENV: test
          ENABLE_AI_FIREWALL: 'false'
          ENABLE_SELF_HEALING: 'false'
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short --no-header -q --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ==========================================
  # Frontend (Next.js)
  # ==========================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npx next lint

      - name: Type Check (tsc)
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.teamgenie.app
          NEXT_PUBLIC_SUPABASE_URL: "https://stub.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "stub-anon-key-for-build-only"

  # ==========================================
  # Security Scan
  # ==========================================
  security:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      # Audit Fix #08: Removed || true — CVEs now actually fail the build
      # Audit against the pre-compiled lock file (apps/api/requirements.lock.txt)
      # to avoid pip's resolution-too-deep error on the large AI dependency tree.
      # Regenerate lock file: uv pip compile apps/api/requirements.txt -o apps/api/requirements.lock.txt --python-version 3.11
      #
      # Acknowledged unfixable findings (--ignore-vuln):
      #   CVE-2025-69872  diskcache: no upstream fix published yet.
      #   GHSA-fv5p-p927-qmxr  langchain-text-splitters: fix is in v1.1.2 which requires the
      #                         full langchain 1.x ecosystem upgrade (tracked separately).
      #   CVE-2026-35029 / CVE-2026-35030 / GHSA-69x8-hrgq-fjj8  litellm: fix requires
      #                         litellm>=1.83 which in turn requires openai>=2.x — a major
      #                         breaking API change tracked separately.
      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r apps/api/requirements.lock.txt --desc \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln GHSA-fv5p-p927-qmxr \
            --ignore-vuln CVE-2026-35029 \
            --ignore-vuln CVE-2026-35030 \
            --ignore-vuln GHSA-69x8-hrgq-fjj8

      # Audit Fix #08: Removed || true — npm vulnerabilities now fail CI.
      # next@14.2.35 fixes the critical auth-bypass (GHSA-f82v-jwr5-mffw).
      # Remaining high-severity DoS CVEs require Next.js 15 (breaking upgrade).
      # Threshold set to critical: CI fails only on actively-exploitable critical issues.
      - name: Node dependency audit
        run: |
          cd apps/web
          npm audit --omit=dev --audit-level=critical

      # Audit Fix: Removed --only-verified so rotated credentials in git history are detected
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main

  # ==========================================
  # Docker Build (validate Dockerfile)
  # ==========================================
  docker:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t teamgenie-api:ci ./apps/api
          docker run --rm teamgenie-api:ci python -c "import fastapi; print('✅ FastAPI import OK')"
