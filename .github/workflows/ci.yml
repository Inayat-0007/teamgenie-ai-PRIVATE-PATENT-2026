name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PYTHON_ENV: 'test'
  ENABLE_AI_FIREWALL: 'false'
  ENABLE_SELF_HEALING: 'false'

jobs:
  # ==========================================
  # Backend (Python / FastAPI)
  # ==========================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt || pip install fastapi uvicorn pydantic pydantic-settings python-dotenv python-multipart python-jose httpx structlog tenacity pytest pytest-cov pytest-asyncio email-validator
          pip install black ruff

      - name: Lint (Ruff — fast)
        run: ruff check . || true

      - name: Format check (Black)
        run: black --check --diff . || true

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy . --ignore-missing-imports --no-error-summary || true

      - name: Test
        env:
          PYTHON_ENV: test
          ENABLE_AI_FIREWALL: 'false'
          ENABLE_SELF_HEALING: 'false'
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short --no-header -q --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ==========================================
  # Frontend (Next.js)
  # ==========================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npx next lint

      - name: Type Check (tsc)
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.teamgenie.app
          NEXT_PUBLIC_SUPABASE_URL: "https://stub.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "stub-anon-key-for-build-only"

  # ==========================================
  # Security Scan
  # ==========================================
  security:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r apps/api/requirements.txt --desc || true

      - name: Node dependency audit
        run: |
          cd apps/web
          npm audit --omit=dev || true

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ==========================================
  # Docker Build (validate Dockerfile)
  # ==========================================
  docker:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t teamgenie-api:ci ./apps/api
          docker run --rm teamgenie-api:ci python -c "import fastapi; print('✅ FastAPI import OK')"
