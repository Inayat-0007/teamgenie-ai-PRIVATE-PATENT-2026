# TeamGenie AI — Prometheus Monitoring
# Scrape metrics from FastAPI + Redis (actual infrastructure)
# Audit Fix: Removed postgres-exporter and qdrant targets — platform uses Turso (SQLite) and Pinecone

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    environment: production
    service: teamgenie

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "teamgenie-api"
    static_configs:
      - targets: ["api:8000"]
        labels:
          app: teamgenie
          component: api
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          app: teamgenie
          component: cache

  # Removed: postgres-exporter — platform uses Turso (SQLite-over-HTTP), not PostgreSQL.
  # The PostgresDown alert fired immediately on every deploy because Postgres was never installed.

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: teamgenie
          component: infrastructure

  # Removed: qdrant — platform uses Pinecone for vector search, not Qdrant.

