# ============================================================
# TeamGenie AI — Local Development Environment
# Usage: docker compose up -d
# Docs: docs/guides/LOCAL_DEVELOPMENT.md
# ============================================================

services:
  # ==========================================
  # BACKEND (FastAPI)
  # ==========================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: base
    container_name: teamgenie-api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - /app/__pycache__
    env_file:
      - ./apps/api/.env
    environment:
      - PYTHON_ENV=development
      - UPSTASH_REDIS_URL=redis://:teamgenie_dev_redis@redis:6379
      - ENABLE_AI_FIREWALL=false
      - ENABLE_SELF_HEALING=false
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - teamgenie-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==========================================
  # FRONTEND (Next.js)
  # ==========================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: teamgenie-web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev
    depends_on:
      - api
    networks:
      - teamgenie-network
    restart: unless-stopped

  # ==========================================
  # REDIS (Cache — local replacement for Upstash)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: teamgenie-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass teamgenie_dev_redis --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - teamgenie-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "teamgenie_dev_redis", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ==========================================
  # POSTGRES (local replacement for Supabase)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: teamgenie-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: teamgenie_dev
      POSTGRES_USER: teamgenie
      POSTGRES_PASSWORD: local_dev_password_change_in_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - teamgenie-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamgenie -d teamgenie_dev"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================================
  # ADMINER (Database GUI)
  # ==========================================
  adminer:
    image: adminer:latest
    container_name: teamgenie-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamgenie-network
    profiles:
      - debug

  # ==========================================
  # MAILHOG (Email Testing)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: teamgenie-mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - teamgenie-network
    profiles:
      - debug

  # ==========================================
  # QDRANT (Vector DB — local replacement for Pinecone)
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: teamgenie-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - teamgenie-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================
  # PROMETHEUS (Metrics)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: teamgenie-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    networks:
      - teamgenie-network
    profiles:
      - monitoring
    restart: unless-stopped

# ==========================================
# VOLUMES (persistent data)
# ==========================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  teamgenie-network:
    driver: bridge
