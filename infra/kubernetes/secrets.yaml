# ============================================
# TeamGenie AI — Kubernetes Secret Template
# USAGE: Fill values → kubectl apply -f secrets.yaml
# All values MUST be base64-encoded
# Example: echo -n "your_value" | base64
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: teamgenie-secrets
  labels:
    app: teamgenie-api
type: Opaque
data:
  # --- LLM Providers ---
  GEMINI_API_KEY: ""        # base64-encoded
  CLAUDE_API_KEY: ""        # base64-encoded (optional)

  # --- Database ---
  TURSO_DATABASE_URL: ""    # base64-encoded libsql://...
  TURSO_AUTH_TOKEN: ""      # base64-encoded

  # --- Auth ---
  SUPABASE_URL: ""          # base64-encoded https://xxx.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: ""  # base64-encoded
  SUPABASE_JWT_SECRET: ""   # base64-encoded (from Supabase Dashboard > Settings > API)

  # --- Cache ---
  UPSTASH_REDIS_URL: ""     # base64-encoded rediss://...

  # --- Vector DB ---
  PINECONE_API_KEY: ""      # base64-encoded

  # --- Monitoring ---
  SENTRY_DSN: ""            # base64-encoded https://xxx@sentry.io/xxx

  # --- Payments ---
  RAZORPAY_KEY_ID: ""       # base64-encoded rzp_live_xxx
  RAZORPAY_KEY_SECRET: ""   # base64-encoded
  RAZORPAY_WEBHOOK_SECRET: ""  # base64-encoded for signature verification
