# ============================================
# TeamGenie AI — Kubernetes Ingress + TLS
# Audit Fix: ClusterIP services were unreachable externally.
# This manifest adds nginx Ingress with cert-manager TLS.
# ============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teamgenie-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - api.teamgenie.app
      secretName: teamgenie-api-tls
  rules:
    - host: api.teamgenie.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teamgenie-api-svc
                port:
                  number: 80
---
# cert-manager ClusterIssuer for Let's Encrypt
# Requires cert-manager to be installed in the cluster:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@teamgenie.app  # CHANGE THIS to your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
